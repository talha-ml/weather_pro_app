name: weather_pro_app
description: A modern professional weather app

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  intl: ^0.19.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.4.9
  lottie: ^3.1.0
  font_awesome_flutter: ^10.7.0
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
